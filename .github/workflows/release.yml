name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v2026.04.10"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Verify public repository
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          visibility="$(gh repo view "${GITHUB_REPOSITORY}" --json visibility --jq '.visibility')"
          if [[ "${visibility}" != "PUBLIC" ]]; then
            echo "Repository must be PUBLIC for anonymous curl installs." >&2
            exit 1
          fi

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/build-release-assets.sh
          scripts/build-release-assets.sh "${GITHUB_REPOSITORY}" dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${{ steps.meta.outputs.tag }}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${{ steps.meta.outputs.tag }}" \
              dist/install.sh#install.sh \
              dist/package.tar.gz#package.tar.gz \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${{ steps.meta.outputs.tag }}" \
              dist/install.sh#install.sh \
              dist/package.tar.gz#package.tar.gz \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "${{ steps.meta.outputs.tag }}" \
              --generate-notes
          fi
