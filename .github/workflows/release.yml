name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v2026.04.10"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Verify public repository
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          visibility="$(gh repo view "${GITHUB_REPOSITORY}" --json visibility --jq '.visibility')"
          if [[ "${visibility}" != "PUBLIC" ]]; then
            echo "Repository must be PUBLIC for anonymous curl installs." >&2
            exit 1
          fi

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/build-release-assets.sh
          scripts/build-release-assets.sh "${GITHUB_REPOSITORY}" dist

      - name: Build release notes
        shell: bash
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          JetPack 5.1 / Ubuntu 20.04 向けの NAS セットアップです。

          ## 利用手順

          1. Jetson でターミナルを開きます。
          2. 次のコマンドをコピーして実行します。

          \`\`\`bash
          curl -fsSL https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/setup.sh | sh
          \`\`\`

          3. 画面の案内に従って NAS の接続先、共有名、ユーザー名、パスワードを入力します。
          4. セットアップ完了後、NAS は \`/mnt/...\` に永続マウントされ、Docker から bind mount で利用できます。

          ## このリリースに含まれるファイル

          - \`setup.sh\`
          - \`payload.tar.gz\`
          EOF

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${{ steps.meta.outputs.tag }}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${{ steps.meta.outputs.tag }}" \
              dist/setup.sh#setup.sh \
              dist/payload.tar.gz#payload.tar.gz \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
            gh release edit "${{ steps.meta.outputs.tag }}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${{ steps.meta.outputs.tag }}" \
              --notes-file release-notes.md
          else
            gh release create "${{ steps.meta.outputs.tag }}" \
              dist/setup.sh#setup.sh \
              dist/payload.tar.gz#payload.tar.gz \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "${{ steps.meta.outputs.tag }}" \
              --notes-file release-notes.md
          fi
